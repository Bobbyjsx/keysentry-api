repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.1
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c "source .venv/bin/activate && pytest -c tests/pytest.ini"
        language: system
        types: [python]
        pass_filenames: false
