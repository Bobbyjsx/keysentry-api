repos:
  - repo: local
    hooks:
      - id: make-lint
        name: make lint
        entry: make lint
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: bash -c "source .venv/bin/activate && pytest -c tests/pytest.ini"
        language: system
        types: [python]
        pass_filenames: false
